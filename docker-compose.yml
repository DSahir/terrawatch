version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: terrawatch-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: terrawatch-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terrawatch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
